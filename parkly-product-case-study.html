  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

dden\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">HOW IT WORKS<\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">END TO END<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:36px;color:var(--accent);margin-bottom:18px\">the whole loop —<\u002Fdiv>\n    <h2 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:96px;line-height:.9;letter-spacing:-2px;margin-bottom:56px\">Four steps, two sides, one connection.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;border-top:1px solid var(--line)\">\n      <div style=\"padding:38px 40px 0 0;border-right:1px solid var(--line)\"><div style=\"font-family:'Barlow Condensed';font-weight:800;font-size:64px;color:var(--accent);margin-bottom:14px\">01<\u002Fdiv><h3 style=\"font-family:'Barlow Condensed';font-weight:700;font-size:40px;line-height:1;margin-bottom:14px\">Owner lists<\u002Fh3><p style=\"font-size:18px;line-height:1.5;color:#555\">A space owner puts their spot on the map — location and timings. Parkly ships the QR sticker.<\u002Fp><\u002Fdiv>\n      <div style=\"padding:38px 40px 0 40px;border-right:1px solid var(--line)\"><div style=\"font-family:'Barlow Condensed';font-weight:800;font-size:64px;color:var(--accent);margin-bottom:14px\">02<\u002Fdiv><h3 style=\"font-family:'Barlow Condensed';font-weight:700;font-size:40px;line-height:1;margin-bottom:14px\">Driver searches<\u002Fh3><p style=\"font-size:18px;line-height:1.5;color:#555\">Open the map anywhere in the country and see real spots near where you're headed.<\u002Fp><\u002Fdiv>\n      <div style=\"padding:38px 40px 0 40px;border-right:1px solid var(--line)\"><div style=\"font-family:'Barlow Condensed';font-weight:800;font-size:64px;color:var(--accent);margin-bottom:14px\">03<\u002Fdiv><h3 style=\"font-family:'Barlow Condensed';font-weight:700;font-size:40px;line-height:1;margin-bottom:14px\">Connect direct<\u002Fh3><p style=\"font-size:18px;line-height:1.5;color:#555\">Parkly shares the spot's details — driver and owner connect and settle it between themselves.<\u002Fp><\u002Fdiv>\n      <div style=\"padding:38px 0 0 40px\"><div style=\"font-family:'Barlow Condensed';font-weight:800;font-size:64px;color:var(--accent);margin-bottom:14px\">04<\u002Fdiv><h3 style=\"font-family:'Barlow Condensed';font-weight:700;font-size:40px;line-height:1;margin-bottom:14px\">QR covers you<\u002Fh3><p style=\"font-size:18px;line-height:1.5;color:#555\">Any issue while parked — anyone can scan the sticker and reach the driver, anonymously.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-end;font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">\n    <span>LIST → SEARCH → CONNECT → SCAN<\u002Fspan>\n    <span style=\"color:var(--ink)\">THE LOOP<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 03 PROBLEM HERO -->\n<section data-label=\"01 Problem\" data-screen-label=\"01 Problem\" data-speaker-notes=\"Set up the problem: cities feel full, but the space isn't gone, it's just idle and invisible.\" style=\"box-sizing:border-box;width:1920px;height:1080px;background:var(--ink);color:var(--paper);font-family:'Barlow',sans-serif;padding:80px 110px;display:flex;flex-direction:column;position:relative;overflow:hidden\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">01 &nbsp;/ &nbsp;THE PROBLEM<\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">DEAD SPACE<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;max-width:1520px\">\n    <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:44px;color:var(--accent);margin-bottom:38px\">the city isn't full —<\u002Fdiv>\n    <h2 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:132px;line-height:.9;letter-spacing:-4px;text-wrap:balance\">It's just <span style=\"color:var(--accent);font-style:italic;font-family:'Instrument Serif',serif;font-weight:400\">hiding<\u002Fspan> its space.<\u002Fh2>\n    <p style=\"font-size:26px;line-height:1.5;color:#cfcfcf;max-width:920px;margin-top:44px;text-wrap:pretty\">Driveways sit empty all day while their owners are at work. Private lots go quiet on weekends. Drivers circle the same block looking for a spot that's ten feet away — behind a fence, off the map, unlisted.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-end;font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">\n    <span>CIRCLING <span style=\"color:var(--paper);margin:0 14px\">·<\u002Fspan> IDLE <span style=\"color:var(--paper);margin:0 14px\">·<\u002Fspan> UNBOOKABLE<\u002Fspan>\n    <span style=\"color:#cfcfcf\">THE PROBLEM<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 04 UNUSED SPACE DETAIL -->\n<section data-label=\"02 Unused Space\" data-screen-label=\"02 Unused Space\" data-speaker-notes=\"Where the supply actually lives: driveways, lots, garages sitting idle most hours of the day.\" style=\"box-sizing:border-box;width:1920px;height:1080px;background:var(--paper);color:var(--ink);font-family:'Barlow',sans-serif;padding:80px 110px;display:flex;flex-direction:column;position:relative;overflow:hidden\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">02 &nbsp;/ &nbsp;UNUSED SPACE<\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">THE SUPPLY<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr;gap:90px;align-items:center\">\n    <div>\n      <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:36px;color:var(--accent);margin-bottom:26px\">what's already there —<\u002Fdiv>\n      <h2 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:96px;line-height:.9;letter-spacing:-2px\">Turn idle<br>space into<br>real spots.<\u002Fh2>\n      <p style=\"font-size:21px;line-height:1.55;color:#555;max-width:520px;margin-top:32px\">Parkly lets anyone with a driveway, a lot, or a spare garage bay put it on the map in minutes. No construction, no permits — just space that already exists, made findable.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:0;border-left:1px solid var(--line)\">\n      <div style=\"display:flex;align-items:center;gap:28px;padding:26px 0 26px 40px;border-bottom:1px solid var(--line)\"><span style=\"font-family:'Barlow Condensed';font-weight:800;font-size:56px;color:var(--accent);min-width:110px\">01<\u002Fspan><div><div style=\"font-family:'Barlow Condensed';font-weight:700;font-size:32px\">Home driveways<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:14px;color:var(--mut);margin-top:4px\">empty on weekdays, 9–5<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:28px;padding:26px 0 26px 40px;border-bottom:1px solid var(--line)\"><span style=\"font-family:'Barlow Condensed';font-weight:800;font-size:56px;color:var(--accent);min-width:110px\">02<\u002Fspan><div><div style=\"font-family:'Barlow Condensed';font-weight:700;font-size:32px\">Office lots<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:14px;color:var(--mut);margin-top:4px\">empty nights &amp; weekends<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:28px;padding:26px 0 26px 40px;border-bottom:1px solid var(--line)\"><span style=\"font-family:'Barlow Condensed';font-weight:800;font-size:56px;color:var(--accent);min-width:110px\">03<\u002Fspan><div><div style=\"font-family:'Barlow Condensed';font-weight:700;font-size:32px\">Retail &amp; church lots<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:14px;color:var(--mut);margin-top:4px\">idle outside business hours<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:28px;padding:26px 0 26px 40px\"><span style=\"font-family:'Barlow Condensed';font-weight:800;font-size:56px;color:var(--accent);min-width:110px\">04<\u002Fspan><div><div style=\"font-family:'Barlow Condensed';font-weight:700;font-size:32px\">Spare garage bays<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:14px;color:var(--mut);margin-top:4px\">never used at all<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 05 NATIONWIDE HERO -->\n<section data-label=\"03 Nationwide\" data-screen-label=\"03 Nationwide\" data-speaker-notes=\"The reach: this isn't a neighborhood tool, it works everywhere the driver goes.\" style=\"box-sizing:border-box;width:1920px;height:1080px;background:var(--ink);color:var(--paper);font-family:'Barlow',sans-serif;padding:80px 110px;display:flex;flex-direction:column;position:relative;overflow:hidden\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">03 &nbsp;/ &nbsp;NATIONWIDE SEARCH<\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">THE REACH<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;max-width:1520px\">\n    <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:44px;color:var(--accent);margin-bottom:38px\">one app, every city —<\u002Fdiv>\n    <h2 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:172px;line-height:.88;letter-spacing:-5px;text-wrap:balance\">Wherever you<br>drive, <span style=\"color:var(--accent);font-style:italic;font-family:'Instrument Serif',serif;font-weight:400\">a spot<\u002Fspan> waits.<\u002Fh2>\n    <p style=\"font-size:26px;line-height:1.5;color:#cfcfcf;max-width:920px;margin-top:48px;text-wrap:pretty\">Same city, different city, road trip across the country — Parkly's map doesn't care. Every listed spot is searchable the moment it's live, so drivers find real spots — and the people who own them — anywhere the network reaches.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-end;font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">\n    <span>SEARCH <span style=\"color:var(--paper);margin:0 14px\">·<\u002Fspan> CONNECT <span style=\"color:var(--paper);margin:0 14px\">·<\u002Fspan> PARK<\u002Fspan>\n    <span style=\"color:#cfcfcf\">THE REACH<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 06 NATIONWIDE DETAIL -->\n<section data-label=\"03 Coverage\" data-screen-label=\"03 Coverage\" data-speaker-notes=\"How the network grows: one listing at a time, radiating out from wherever hosts sign up.\" style=\"box-sizing:border-box;width:1920px;height:1080px;background:var(--paper);color:var(--ink);font-family:'Barlow',sans-serif;padding:80px 110px;display:flex;flex-direction:column;position:relative;overflow:hidden\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">03 &nbsp;/ &nbsp;NATIONWIDE SEARCH<\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">HOW IT GROWS<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:grid;grid-template-columns:1.1fr 1fr;gap:90px;align-items:center\">\n    <div>\n      <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:36px;color:var(--accent);margin-bottom:26px\">it scales with people —<\u002Fdiv>\n      <h2 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:88px;line-height:.9;letter-spacing:-2px\">No lot ever<br>needs installing.<\u002Fh2>\n      <p style=\"font-size:21px;line-height:1.55;color:#555;max-width:540px;margin-top:32px\">Every new host adds one more dot to the map — instantly searchable, no infrastructure required. That's what lets Parkly cover a city, then a state, then the country, at the pace people sign up.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"position:relative;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center\">\n      <svg viewBox=\"0 0 400 400\" width=\"440\" style=\"overflow:visible\">\n        <circle cx=\"200\" cy=\"200\" r=\"60\" fill=\"none\" stroke=\"var(--line)\" stroke-width=\"1.5\"><\u002Fcircle>\n        <circle cx=\"200\" cy=\"200\" r=\"120\" fill=\"none\" stroke=\"var(--line)\" stroke-width=\"1.5\"><\u002Fcircle>\n        <circle cx=\"200\" cy=\"200\" r=\"180\" fill=\"none\" stroke=\"var(--line)\" stroke-width=\"1.5\"><\u002Fcircle>\n        <circle cx=\"200\" cy=\"200\" r=\"8\" fill=\"var(--accent)\"><\u002Fcircle>\n        <circle cx=\"235\" cy=\"150\" r=\"6\" fill=\"var(--ink)\"><\u002Fcircle>\n        <circle cx=\"150\" cy=\"240\" r=\"6\" fill=\"var(--ink)\"><\u002Fcircle>\n        <circle cx=\"270\" cy=\"250\" r=\"6\" fill=\"var(--ink)\"><\u002Fcircle>\n        <circle cx=\"120\" cy=\"150\" r=\"6\" fill=\"var(--ink)\"><\u002Fcircle>\n        <circle cx=\"180\" cy=\"320\" r=\"5\" fill=\"#bdbdbd\"><\u002Fcircle>\n        <circle cx=\"310\" cy=\"180\" r=\"5\" fill=\"#bdbdbd\"><\u002Fcircle>\n        <circle cx=\"90\" cy=\"260\" r=\"5\" fill=\"#bdbdbd\"><\u002Fcircle>\n        <circle cx=\"260\" cy=\"90\" r=\"5\" fill=\"#bdbdbd\"><\u002Fcircle>\n        <circle cx=\"330\" cy=\"290\" r=\"4\" fill=\"#dedede\"><\u002Fcircle>\n        <circle cx=\"70\" cy=\"100\" r=\"4\" fill=\"#dedede\"><\u002Fcircle>\n        <circle cx=\"330\" cy=\"110\" r=\"4\" fill=\"#dedede\"><\u002Fcircle>\n        <circle cx=\"100\" cy=\"330\" r=\"4\" fill=\"#dedede\"><\u002Fcircle>\n      <\u002Fsvg>\n      <div style=\"position:absolute;bottom:-10px;left:0;right:0;text-align:center;font-family:'JetBrains Mono';font-size:13px;letter-spacing:2px;color:var(--mut)\">FIRST HOST → NEIGHBORHOOD → CITY → NATION<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 07 QR HERO -->\n<section data-label=\"04 QR Alert\" data-screen-label=\"04 QR Alert\" data-speaker-notes=\"The trust mechanic: how strangers communicate about parking without exchanging any personal info.\" style=\"box-sizing:border-box;width:1920px;height:1080px;background:var(--ink);color:var(--paper);font-family:'Barlow',sans-serif;padding:80px 110px;display:flex;flex-direction:column;position:relative;overflow:hidden\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">04 &nbsp;/ &nbsp;THE QR ALERT<\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">THE TRUST<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:flex;justify-content:space-between;align-items:center;gap:80px\">\n    <div style=\"max-width:960px\">\n      <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:44px;color:var(--accent);margin-bottom:38px\">a knock, without a number —<\u002Fdiv>\n      <h2 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:150px;line-height:.88;letter-spacing:-5px;text-wrap:balance\">Scan the code.<br>Skip the <span style=\"color:var(--accent);font-style:italic;font-family:'Instrument Serif',serif;font-weight:400\">issue<\u002Fspan>.<\u002Fh2>\n      <p style=\"font-size:26px;line-height:1.5;color:#cfcfcf;max-width:820px;margin-top:44px;text-wrap:pretty\">Every Parkly spot carries a QR sticker. Blocked in? Need someone to move? Scan it, send a message — it reaches the driver instantly, with neither side ever seeing the other's phone number.<\u002Fp>\n    <\u002Fdiv>\n    <svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"-115 110 130 130\" width=\"260\" style=\"overflow:visible;flex-shrink:0\">\n      <g fill=\"var(--accent)\"><rect x=\"-104.85\" y=\"124.387\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-83.35\" y=\"124.387\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-61.85\" y=\"124.387\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-104.85\" y=\"145.887\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-83.35\" y=\"167.387\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-61.85\" y=\"167.387\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-104.85\" y=\"167.387\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-61.85\" y=\"145.887\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-18.85\" y=\"124.387\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-61.85\" y=\"188.887\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-40.35\" y=\"210.387\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-18.85\" y=\"210.387\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-18.85\" y=\"188.887\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-104.85\" y=\"210.387\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-61.85\" y=\"210.387\" width=\"20.5\" height=\"20.5\"><\u002Frect><rect x=\"-40.35\" y=\"167.387\" width=\"20.5\" height=\"20.5\"><\u002Frect><\u002Fg>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-end;font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">\n    <span>SCAN <span style=\"color:var(--paper);margin:0 14px\">·<\u002Fspan> MESSAGE <span style=\"color:var(--paper);margin:0 14px\">·<\u002Fspan> ANONYMOUS<\u002Fspan>\n    <span style=\"color:#cfcfcf\">THE TRUST<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 08 QR DETAIL / FLOW -->\n<section data-label=\"04 How it works\" data-screen-label=\"04 QR Flow\" data-speaker-notes=\"Break the alert flow into three steps, plainly.\" style=\"box-sizing:border-box;width:1920px;height:1080px;background:var(--paper);color:var(--ink);font-family:'Barlow',sans-serif;padding:80px 110px;display:flex;flex-direction:column;position:relative;overflow:hidden\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">04 &nbsp;/ &nbsp;THE QR ALERT<\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">THREE STEPS<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:0\">\n    <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:36px;color:var(--accent);margin-bottom:46px\">no app required to reply —<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border-top:1px solid var(--line)\">\n      <div style=\"padding:44px 48px 0 0;border-right:1px solid var(--line)\"><div style=\"font-family:'JetBrains Mono';font-size:14px;color:var(--accent);margin-bottom:18px\">STEP 01<\u002Fdiv><h3 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:60px;line-height:.95;letter-spacing:-1px;margin-bottom:20px\">Scan the sticker.<\u002Fh3><p style=\"font-size:19px;line-height:1.55;color:#555\">Any phone camera reads the code on the spot's Parkly sticker — no download needed to send an alert.<\u002Fp><\u002Fdiv>\n      <div style=\"padding:44px 48px 0 48px;border-right:1px solid var(--line)\"><div style=\"font-family:'JetBrains Mono';font-size:14px;color:var(--accent);margin-bottom:18px\">STEP 02<\u002Fdiv><h3 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:60px;line-height:.95;letter-spacing:-1px;margin-bottom:20px\">Send a message.<\u002Fh3><p style=\"font-size:19px;line-height:1.55;color:#555\">A short web form opens. Type the issue — \"blocked me in,\" \"need you to move\" — and send.<\u002Fp><\u002Fdiv>\n      <div style=\"padding:44px 0 0 48px\"><div style=\"font-family:'JetBrains Mono';font-size:14px;color:var(--accent);margin-bottom:18px\">STEP 03<\u002Fdiv><h3 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:60px;line-height:.95;letter-spacing:-1px;margin-bottom:20px\">Driver gets notified.<\u002Fh3><p style=\"font-size:19px;line-height:1.55;color:#555\">The message routes straight to the driver's phone. Both sides stay anonymous, every time.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:56px;margin-top:64px;padding-top:30px;border-top:1px solid var(--line);font-family:'JetBrains Mono';font-size:14px;letter-spacing:1px;color:var(--mut)\">\n      <span><span style=\"color:var(--accent)\">✕<\u002Fspan>&nbsp; NO PHONE NUMBERS EXCHANGED<\u002Fspan>\n      <span><span style=\"color:var(--accent)\">✕<\u002Fspan>&nbsp; NO NOTES UNDER WIPERS<\u002Fspan>\n      <span><span style=\"color:var(--accent)\">✕<\u002Fspan>&nbsp; NO TOWING CALLS<\u002Fspan>\n      <span><span style=\"color:var(--accent)\">✕<\u002Fspan>&nbsp; NO CONFRONTATIONS<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 09 BUSINESS MODEL HERO -->\n<section data-label=\"05 Business\" data-screen-label=\"05 Business\" data-speaker-notes=\"Frame the two-sided model plainly before getting into numbers.\" style=\"box-sizing:border-box;width:1920px;height:1080px;background:var(--ink);color:var(--paper);font-family:'Barlow',sans-serif;padding:0;display:flex;position:relative;overflow:hidden\">\n  <div style=\"flex:1;background:var(--ink);padding:80px 80px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid #262626\">\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">A &nbsp;/ &nbsp;THE OWNER<\u002Fdiv>\n    <div>\n      <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:34px;color:var(--accent);margin-bottom:8px\">earns.<\u002Fdiv>\n      <h3 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:88px;line-height:.92;letter-spacing:-2px;color:var(--paper)\">Lists a spot,<br>deals direct.<\u002Fh3>\n      <p style=\"font-size:19px;line-height:1.5;color:#bbb;max-width:480px;margin-top:22px\">A driveway that made nothing yesterday earns from the driver directly. Parkly makes the introduction, ships the QR sticker, and stays out of the transaction.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:14px;font-family:'JetBrains Mono';font-size:14px;letter-spacing:1.5px;color:#888;border-top:1px solid #262626;padding-top:26px\">\n      <span><span style=\"color:var(--accent)\">→<\u002Fspan>&nbsp; EARNS DIRECT FROM THE DRIVER<\u002Fspan>\n      <span><span style=\"color:var(--accent)\">→<\u002Fspan>&nbsp; KEEPS 100% OF WHAT THEY CHARGE<\u002Fspan>\n      <span><span style=\"color:var(--accent)\">→<\u002Fspan>&nbsp; NO LISTING FEE, EVER<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:var(--paper);color:var(--ink);padding:80px 80px;display:flex;flex-direction:column;justify-content:space-between\">\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">B &nbsp;/ &nbsp;THE PLATFORM<\u002Fdiv>\n    <div>\n      <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:34px;color:var(--accent);margin-bottom:8px\">charges to connect.<\u002Fdiv>\n      <h3 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:88px;line-height:.92;letter-spacing:-2px\">A fee to share<br>the details.<\u002Fh3>\n      <p style=\"font-size:19px;line-height:1.5;color:#555;max-width:480px;margin-top:22px\">Drivers pay a small charge to unlock a spot's details and reach its owner. Parkly earns only when it makes a connection — nothing before, nothing on top.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:14px;font-family:'JetBrains Mono';font-size:14px;letter-spacing:1.5px;color:var(--mut);border-top:1px solid var(--line);padding-top:26px\">\n      <span><span style=\"color:var(--accent)\">→<\u002Fspan>&nbsp; PAID PER CONNECTION, BY THE DRIVER<\u002Fspan>\n      <span><span style=\"color:var(--accent)\">→<\u002Fspan>&nbsp; NO CUT OF THE OWNER'S EARNINGS<\u002Fspan>\n      <span><span style=\"color:var(--accent)\">→<\u002Fspan>&nbsp; SCALES WITH EVERY SEARCH<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 10 MARKET SIZE / OPPORTUNITY -->\n<section data-label=\"05 Market Size\" data-screen-label=\"05 Market\" data-speaker-notes=\"India-first framing: no invented numbers, just the scale of the chaos we're stepping into.\" style=\"box-sizing:border-box;width:1920px;height:1080px;background:var(--ink);color:var(--paper);font-family:'Barlow',sans-serif;padding:80px 110px;display:flex;flex-direction:column;position:relative;overflow:hidden\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">05 &nbsp;/ &nbsp;THE BUSINESS<\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">THE OPPORTUNITY<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;max-width:1560px\">\n    <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:40px;color:var(--accent);margin-bottom:32px\">a market the size of a country —<\u002Fdiv>\n    <h2 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:144px;line-height:.9;letter-spacing:-4px;text-wrap:balance\">Built for <span style=\"color:var(--accent);font-style:italic;font-family:'Instrument Serif',serif;font-weight:400\">India<\u002Fspan>,<br>first.<\u002Fh2>\n    <p style=\"font-size:25px;line-height:1.55;color:#cfcfcf;max-width:980px;margin-top:40px;text-wrap:pretty\">More two- and four-wheelers hit Indian roads every year than most countries have on them entirely — and almost none of that growth came with a parking plan. Every metro, every high-rise, every market street is the same fight for the same six feet of curb.<\u002Fp>\n    <div style=\"display:flex;gap:0;margin-top:52px;border-top:1px solid #262626\">\n      <div style=\"flex:1;padding:26px 40px 0 0;border-right:1px solid #262626\"><div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:2px;color:var(--accent);margin-bottom:10px\">EVERY METRO<\u002Fdiv><div style=\"font-size:18px;line-height:1.5;color:#bbb\">Mumbai to Bengaluru — the same story, block by block.<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1;padding:26px 40px;border-right:1px solid #262626\"><div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:2px;color:var(--accent);margin-bottom:10px\">EVERY BUILDING<\u002Fdiv><div style=\"font-size:18px;line-height:1.5;color:#bbb\">Housing societies and offices sit on space nobody's monetized.<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1;padding:26px 0 0 40px\"><div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:2px;color:var(--accent);margin-bottom:10px\">EVERY DAY<\u002Fdiv><div style=\"font-size:18px;line-height:1.5;color:#bbb\">This isn't a seasonal squeeze — it's the daily default.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 11 VISION / CLOSE -->\n<section data-label=\"06 Vision\" data-screen-label=\"06 Vision\" data-speaker-notes=\"Close on the bigger picture and a clear ask.\" style=\"box-sizing:border-box;width:1920px;height:1080px;background:var(--ink);color:var(--paper);font-family:'Barlow',sans-serif;padding:80px 110px;display:flex;flex-direction:column;position:relative;overflow:hidden\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">06 &nbsp;/ &nbsp;THE VISION<\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">WHAT'S NEXT<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;max-width:1520px\">\n    <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:44px;color:var(--accent);margin-bottom:38px\">every idle spot, working —<\u002Fdiv>\n    <h2 style=\"font-family:'Barlow Condensed';font-weight:800;font-size:172px;line-height:.88;letter-spacing:-5px;text-wrap:balance\">A parking spot<br>for <span style=\"color:var(--accent);font-style:italic;font-family:'Instrument Serif',serif;font-weight:400\">every<\u002Fspan> car.<\u002Fh2>\n    <p style=\"font-size:26px;line-height:1.5;color:#cfcfcf;max-width:920px;margin-top:48px;text-wrap:pretty\">Not by building more concrete — by using what's already there. Every driveway, lot, and garage on the network is one less car circling the block.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-end;font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;color:var(--mut)\">\n    <span>THANK YOU<\u002Fspan>\n    <span style=\"color:#cfcfcf\">PARKLY<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fx-import>\n\n<\u002Fx-dc>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
